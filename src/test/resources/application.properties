# Use H2 in-memory database for tests in PostgreSQL compatibility mode
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate config for testing
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Create the schema automatically for tests
spring.jpa.hibernate.ddl-auto=create-drop

# CRITICAL: Stop Spring from running Postgres-specific schema.sql and data.sql
spring.sql.init.mode=never