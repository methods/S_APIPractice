# ==============================================================================
# LOCAL DEVELOPMENT DATABASE (FALLBACK)
# ==============================================================================
# This Docker Compose file provisions a local PostgreSQL container.
# It is designed to be used when GitHub Codespaces is unavailable, or when
# working entirely offline on a corporate machine.
#
# SECURITY NOTE: This database is exclusively for local testing and will only
# contain ephemeral/throwaway data. Therefore, it is perfectly safe to hardcode
# the credentials ('local_user' / 'local_password') directly in this file.
# This ensures "zero-friction" onboarding for any developer cloning the repo.
# ==============================================================================

services:
  postgres:
    # Matched exactly to Supabase production version (PostgreSQL 18.1 on Debian)
    image: postgres:18.1
    container_name: local-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hearings_demo
      POSTGRES_USER: local_user
      POSTGRES_PASSWORD: local_password
    volumes:
      # Postgres 18+ requires mounting to the parent directory, not the data/ subdir.
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data: